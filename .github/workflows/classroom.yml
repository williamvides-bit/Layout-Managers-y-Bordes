name: APE115 — Evaluación Layout Managers y Bordes

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  evaluar:
    name: Autocalificación — Layout Managers y Bordes
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias de pantalla virtual (Swing headless)
        run: |
          sudo apt-get install -y xvfb libx11-dev libxext-dev -qq 2>/dev/null || true

      - name: Compilar el proyecto
        run: mvn compile -q

      - name: Ejecutar tests de evaluación
        id: tests
        run: |
          mvn test -Djava.awt.headless=true 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Publicar resultado en GitHub Summary
        if: always()
        run: |
          echo "## 📊 Resultado — Evaluación Layout Managers y Bordes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Ejercicio | Descripción | Pts |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| E1 | BorderLayout + LineBorder | /10 |" >> $GITHUB_STEP_SUMMARY
          echo "| E2 | BoxLayout Y_AXIS + CompoundBorder | /15 |" >> $GITHUB_STEP_SUMMARY
          echo "| E3 | JSplitPane HORIZONTAL_SPLIT | /10 |" >> $GITHUB_STEP_SUMMARY
          echo "| E4 | GridBagLayout + CompoundBorder | /20 |" >> $GITHUB_STEP_SUMMARY
          echo "| E5 | JTabbedPane + GridLayout + EtchedBorder | /20 |" >> $GITHUB_STEP_SUMMARY
          echo "| E7 | FlowLayout(RIGHT) + MatteBorder | /5 |" >> $GITHUB_STEP_SUMMARY
          echo "| BONUS E6 | BevelBorder + SoftBevelBorder | +5 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -E "Tests run|FAILED|ERROR|BUILD" test_output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Subir resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-${{ github.sha }}
          path: |
            test_output.txt
            target/surefire-reports/
          retention-days: 30
